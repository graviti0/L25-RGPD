{% extends "base.html" %}

{% block content %}


  <div class="px-10 pb-12 pt-8">
    <h1 class="mb-1 font-display text-[36px] font-bold">Documentation</h1>
    <p class="mb-5 text-[17px] text-neutral-500">Tout comprendre à la protection des données, en clair.</p>

    <!-- Tabs RGPD / Loi 25 -->
    <div class="mb-6 flex flex-wrap gap-3" id="tabs">
      <button hx-get="{% url 'documentation_choice' 'RGPD' %}" hx-target="#main-doc" hx-trigger="load, click" data-tab="rgpd" class="tab cursor-pointer rounded-3xl border-2 border-ink bg-sky px-5 py-2.5 font-display text-base font-bold shadow-sketch-sm transition">Qu'est-ce que le RGPD ?</button>
      <button hx-get="{% url 'documentation_choice' 'L25' %}" hx-target="#main-doc" hx-trigger="click" data-tab="loi25" class="tab cursor-pointer rounded-3xl border-2 border-ink bg-white px-5 py-2.5 font-display text-base font-bold transition">Qu'est-ce que la Loi 25 ?</button>
    </div>

    <div id="main-doc" class="grid items-start gap-6 md:grid-cols-[210px_1fr]">
    </div>
  </div>

  <!-- Footer -->
  {% include 'components/Footer.html' %}




{% endblock %}
