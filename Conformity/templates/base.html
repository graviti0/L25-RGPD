<!DOCTYPE html>
<html lang="fr">
{% load tailwind_tags %}
{% load django_htmx %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% tailwind_css %}
    {% htmx_script %}
</head>
<body>
    {% include 'NavBar.html' %}
    {% block content %}
    
    {% endblock %}
    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        })
    </script>
</body>
</html>
