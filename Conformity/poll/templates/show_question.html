
{% block content %}

  <section id="view-quiz" class="mx-auto hidden max-w-[600px] px-10 pb-10 pt-9">
    <div class="flex items-center justify-between">
      <span class="font-display text-[15px] font-bold uppercase tracking-wide text-accent" id="q-counter">Question 1 / 5</span>
      <div class="flex gap-2">
        <span class="rounded-3xl border-2 border-ink bg-skylite px-3 py-1 font-display text-[13px] font-bold" id="q-frame">Cadre : RGPD</span>
        <div class="relative">
          <button id="list-btn" class="cursor-pointer rounded-3xl border-2 border-ink bg-white px-3 py-1 font-display text-[13px] font-bold">☰ Liste ⌄</button>
          <div id="list-menu" class="absolute right-0 z-10 mt-2 hidden w-56 rounded-xl border-2 border-ink bg-white p-3 shadow-sketch">
            <div class="mb-2 font-display text-[12px] font-bold uppercase tracking-wide text-accent">Aller à la question</div>
            <div class="grid grid-cols-5 gap-2" id="list-grid"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Compact progress -->
    <div class="mb-1.5 mt-3.5">
      <div class="flex h-3 gap-0.5">
        <div id="bar-done" class="border-2 border-ink bg-accent" style="flex:0"></div>
        <div id="bar-rest" class="border-2 border-l-0 border-ink bg-white" style="flex:5"></div>
      </div>
      <div class="mt-1.5 flex justify-between font-body text-[13px] text-neutral-500">
        <span id="prog-answered">0 répondue</span><span id="prog-pct">0 % du quiz</span>
      </div>
    </div>
    <p class="mb-5 mt-0.5 font-body text-[13px] text-neutral-400">↳ Ouvrez « Liste » pour revenir directement à une question répondue</p>

    <h2 id="q-title" class="mb-1.5 font-display text-[30px] font-bold leading-tight">…</h2>
    <p id="q-hint" class="mb-4.5 font-body text-[15px] text-neutral-500">…</p>

    <div id="q-options" class="mt-4 flex flex-col gap-3"></div>

    <div class="mt-7 flex justify-between">
      <button id="prev-btn" class="inline-flex cursor-pointer items-center gap-2 rounded-xl border-2 border-ink bg-white px-6 py-3 font-display text-base font-bold disabled:cursor-not-allowed disabled:opacity-40">← Précédente</button>
      <button id="next-btn" class="inline-flex cursor-pointer items-center gap-2 rounded-xl border-2 border-ink bg-sky px-6 py-3 font-display text-base font-bold shadow-sketch">Suivante →</button>
    </div>
  </section>

  <!-- Footer -->
  {% include 'components/Footer.html' %}



{% endblock %}
